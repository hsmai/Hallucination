# =============================================================================
# unified_settings.yaml — 모든 실험 세팅의 단일 소스 (하드코딩 금지)
#
# 상태 표기:
#   확정        : 논문/blueprint에서 확정된 값. 변경 시 보고 필요.
#   UNKNOWN_pending_server : 서버의 OURS(omni-steering) 코드 확인 후 확정.
#                            그 전까지는 temp_default(MAD repo 세팅)를 사용.
# 문자열 값 "UNKNOWN_pending_server"를 읽은 코드는 반드시 같은 키의
# temp_default를 사용하고, 로그에 pending 경고를 남긴다.
# =============================================================================

experiment:
  seed: 42                      # 확정
  dtype: bfloat16               # 확정 (4bit/8bit 양자화 금지)
  attn_implementation: sdpa     # 확정(2026-07-16 게이트) — 비AVCD 방법용 LLM attention.
                                # 선배 최종 파이프라인(mixed_sdpa)과 커널 정렬: eager로는 경계선 샘플이
                                # 뒤집혀 Language Dom 일치율 89%, sdpa로 98% (per-sample 대조 실증).
                                # AVCD는 attention weight가 필요해 자체 경로 사용(VL2=fork manual eager,
                                # Qwen=thinker eager 패치) — 이 키의 영향을 받지 않음.
  device: cuda
  single_run: true              # greedy 단일 run

decoding:                       # 확정 (2026-07-16 OURS 코드 대조 — probe/inference.py forced_yesno)
  do_sample: false
  temperature: 0.0
  top_p: null                   # greedy에서는 미사용
  max_new_tokens:
    avhbench: 1                 # 확정 — OURS Base = 마지막 위치 full-vocab argmax
                                #   (= generate(max_new_tokens=1) 등가, 주석에 MAD-parity 명시)
    cmm: 1                      # 확정 — 동일 (probe/cmm_contam.py forced_yesno)

models:
  videollama2_av:
    hf_id: DAMO-NLP-SG/VideoLLaMA2.1-7B-AV
    local_path: /home3/t202401082/.cache/huggingface/hub/models--DAMO-NLP-SG--VideoLLaMA2.1-7B-AV/snapshots/d944d4298cb0188c3d5406eff42929cb67731361  # 확정 — 선배 HF 캐시 (다운로드 불필요)
    backbone: qwen2
    num_llm_layers: 28
    # AVCD span 참고값(하드코딩 금지 — 런타임에 동적 계산하고 아래 값과 대조 검증만 한다)
    expected_video_tokens: 676
    expected_audio_tokens: 1496
  qwen2_5_omni_7b:
    hf_id: Qwen/Qwen2.5-Omni-7B               # 7B 고정 (MAD sh의 3B 예시 사용 금지)
    local_path: /home3/t202401082/.cache/huggingface/hub/models--Qwen--Qwen2.5-Omni-7B/snapshots/ae9e1690543ffd5c0221dc27f79834d0294cba00  # 확정 — 선배 HF 캐시
    disable_talker: true
    encoder_attn_implementation: flash_attention_2  # 확정 — OURS "mixed" 방식: 인코더 flash(OOM 방지)
                                                    # + thinker text만 eager 스왑 (전 방법 동일, AVCD 패치 대상)
                                                    # talker는 enable_audio_output=False로 아예 미생성 (24GB 대응)
    use_audio_in_video: true                  # AVHBench: mp4에 오디오 먹싱됨(muxed). CMM은 별도 wav→separate

paths:
  # 확정 (2026-07-16) — 선배 안내: omni-steering 내부 데이터셋을 경로 맞춰 사용
  data_prefix: /home3/t202401082/omni-steering/Dataset
  avhbench_media_dir: /home3/t202401082/omni-steering/Dataset/AVH_Bench   # videos/{id}.mp4 (오디오 먹싱, audios/ 없음)
  cmm_media_dir: /home3/t202401082/omni-steering/Dataset/CMM_dataset      # reorg_raw_files/... (+ _fixed/ 재인코딩본)
  results_dir: results
  skip_media_existence_check: true             # 로컬 개발용. 서버 실행 시 false 권장

benchmarks:
  avhbench:
    qa_json: data/qa/avhbench_qa.json          # 로컬 확보본 (서버 Dataset/AVH_Bench/QA.json과 동일본 — S1에서 diff 확인)
    val_json: data/qa/avhbench_val.json        # AVCD 논문 validation (205) — 논문 수치 대조용
    test_json: data/qa/avhbench_test.json      # AVCD 논문 test (5,302) — 〃
    split: full_qa_excluding_av_tasks          # 확정 — OURS avh_contam은 V2A/A2V task 전체만 평가
                                               #   (AV Matching/Captioning 미포함, MAD 프로토콜과 일치)
    tasks_for_overall:                          # MAD score.py 기준
      - Video-driven Audio Hallucination
      - Audio-driven Video Hallucination
    audio_in_video: true                        # 확정 — mp4에 aac 먹싱. 별도 audios/ 없음
                                                #   audio-only branch는 mp4에서 추출 (process_audio_from_video)
  cmm:
    qa_json: data/qa/cmm_qa.json
    categories: over-reliance_unimodal_priors  # 확정 — OURS cmm_contam.py CATEGORY ("CMM standard eval,
                                               #   3 dominance sub_categories", Language Dom 포함 require_av=False)
    audio_from_video_stem: true                # audio = video 경로의 .mp4→.wav (annotation의 audio_path 사용)
    blocklist: data/qa/cmm_blocklist.txt       # 확정 — 디코더 hang 유발 손상 mp4 8건 (OURS와 동일)
    fixed_dir: _fixed                          # {cmm_media_dir}/_fixed/{id}.mp4 재인코딩본으로 교체
    load_timeout_s: 60                         # OURS와 동일한 비디오 로드 타임아웃 가드

prompts:
  # 확정 (2026-07-16) — 모델별로 다름! OURS가 "각 모델 자체 eval 프롬프트에 맞춤(baseline comparability)"
  #   Qwen: probe/config.py ANSWER_QUERY_PROMPT (두 벤치 공통)
  #   VideoLLaMA2: probe/vl2_contam.py PROMPT_SUFFIX (MAD repo eval_batch.py:75 / eval_batch_cmm.py:107과 일치)
  avhbench_suffix:
    qwen2_5_omni_7b: " Answer only 'Yes' or 'No'. Do not include any explanation."
    videollama2_av: " Answer only 'Yes' or 'No'."
  cmm_suffix:
    qwen2_5_omni_7b: " Answer only 'Yes' or 'No'. Do not include any explanation."
    videollama2_av: " Only yes/no. No extra text."
  qwen_system_prompt: "You are Qwen, a virtual human developed by the Qwen Team, Alibaba Group, capable of perceiving auditory and visual inputs, as well as generating text and speech."
  videollama2_system_prompt: ""               # qwen2 backbone은 chat template 기본값 외 없음
  mad_modality_query: "To answer this question, which modality is needed (audio, video, or both): "
  mad_question_wrap: "Question: {question}\n" # head 프롬프트에서 question을 감싸는 형식

methods:
  base: {}                                     # 원본 greedy 디코딩

  vcd_ext:
    # MAD 논문 Eq.10 계수: [1+3α, -α, -α, -α] over [VA, V, A, T]  (확정)
    alpha:
      status: UNKNOWN_pending_server           # 논문·코드 모두 값 미명시 (mm_default_cd default 0.5)
      temp_default: 0.5
      gate_candidates: [0.5, 2.5]              # 게이트에서 MAD 논문 Table 1 VCD-ext 행과 대조하여 확정
    branch_mode: modality_ablation             # 잠정 — MAD 논문 Eq.7·Eq.10 근거 (paper_settings.md §1·§5).
                                               # 서버 OURS 확인 후 최종. (diffusion_noise는 AVCD repo VCD 전용)

  mad:
    gamma: 2.5                                 # 확정 (논문·batch sh)
    # 가중식 (코드 기준, docs/code_analysis.md §1.4):
    #   w_VA=2+2γ·p_both, w_V=1-γ(p_both-p_video), w_A=1-γ(p_both-p_audio), w_T=-γ(p_video+p_audio)
    weight_per_question: true                  # 질문당 1회 추출 후 고정 (확정)

  avcd:
    alpha:
      avhbench: 2.5                            # 확정 (논문·inference_AVH_*.py)
      cmm:
        status: UNKNOWN_pending_server         # 논문에 없음 → 서버 게이트에서 그리드 탐색 후 확정
        temp_default: 0.5
        grid_search: {min: 0.5, max: 3.0, step: 0.5, n_samples: 100}
    masking_top_p: 0.5                         # 확정 (논문 P=50%, 코드 quantile 0.5)
    exclude_last_layer: true                   # 확정 — 마스킹·dominance 모두 마지막 layer 제외
    ead_tau: 0.6                               # 확정 (논문·코드 일치)
    plausibility_beta: 0.2                     # ⚠ 코드값. 논문 Supp.B는 β=0.1 + −inf fill (paper_settings.md §2)
                                               #   → 게이트에서 AVH val 81.95 재현되는 쪽으로 확정
    plausibility_beta_paper: 0.1               # 논문 모드용
    implausible_fill: -1.0e-4                  # ⚠ 코드 그대로(-inf 아님). faithful 재현용
    faithful_mode: true                        # true: 코드 특이점 그대로 / false: 논문 서술 기준(-inf, β=0.1)
    videollama2_backend: official_fork         # AVCD×VideoLLaMA2는 공식 fork(third_party/AVCD) 사용
    videollama2_dtype: float16                 # ⚠ fork 내부 fp16 캐스팅 하드코딩 → 이 run만 fp16
                                               #   (bf16 통일 원칙의 유일한 예외 — 게이트에서 영향 확인)

scoring:
  scorer: mad_score                            # 확정 — OURS probe/analysis.py normalize_answer/extract_answer가
                                               #   MAD score.py 로직과 동일(yes 우선 규칙 포함). 이식본 그대로 사용
  yes_before_no: true                          # MAD extract_answer: yes 패턴 우선
  dedup_key: [video_id, question]

# 실행 중 모니터링 (러너 체크포인트 — 수치 산출과 무관, 로그·별도 파일만)
monitoring:
  enabled: true
  checkpoints: [0.25, 0.5, 0.75, 1.0]          # 전체의 1/4 지점마다 체크포인트 블록
  probe_prompt: "Please describe what you can hear and see in detail."  # MAD Fig.9-10 문구 그대로
  probe_max_new_tokens: 256                     # 논문 미명시 — repo 생성 루프 기본값 계열
  probe_frames: 2                               # 체크포인트 샘플 프레임 저장 수 (ffmpeg 있을 때)

# 게이트 검증 목표치 (run_gate.sh에서 대조. 출처: docs/paper_settings.md)
gate_targets:
  tolerance_pp: 2.0                            # 논문 재현 허용 오차 ±2%p (blueprint S2)
  # 선배 완료 실험 — Base 정합성의 1차 기준 (Experiments.pdf 하단 표 / 슬라이드 p45)
  ours_base:
    videollama2_av: {cmm_overall: [73.6, 74.0], avh_overall: 77.4}   # CMM은 두 버전 존재
    qwen2_5_omni_7b: {cmm_overall: 73.1, avh_overall: 76.8}
  # MAD 논문 Table 1 (전 비교군 재현 목표, CMM V/A/L/Overall, AVH VdAH/AdVH/Overall)
  # ⚠ AVCD 행은 MAD 저자들의 비공개 재구현 수치 — 우리 신규 구현과 정확히 일치할 보장 없음.
  #   ±2%p 참고 기준으로만 사용, 불일치 시 원인 분석 기록 (paper_settings.md §6)
  mad_paper_table1:
    videollama2_av:
      base:    {cmm: [71.8, 80.0, 68.8, 73.5], avh: [75.7, 79.0, 77.4]}
      vcd_ext: {cmm: [71.3, 83.3, 74.8, 76.4], avh: [66.0, 74.8, 70.4]}
      avcd:    {cmm: [71.8, 84.0, 71.5, 75.8], avh: [78.3, 80.3, 79.3]}
      mad:     {cmm: [82.3, 84.3, 77.5, 81.3], avh: [79.7, 79.1, 79.4]}
    qwen2_5_omni_7b:
      base:    {cmm: [64.5, 72.3, 81.3, 72.7], avh: [73.0, 80.7, 76.9]}
      vcd_ext: {cmm: [62.5, 71.3, 84.5, 72.8], avh: [70.3, 77.1, 73.7]}
      avcd:    {cmm: [66.3, 72.8, 81.0, 73.3], avh: [75.8, 79.7, 77.8]}
      mad:     {cmm: [76.8, 84.3, 83.3, 81.4], avh: [78.7, 84.4, 81.6]}
  # AVCD 논문 자체 수치 (split 판정용, VideoLLaMA2·AVHBench)
  avcd_paper: {avh_full_test: 72.15, avh_val: 81.95}

output:
  # D2 스키마 (blueprint) — per-sample JSONL
  jsonl_fields: [sample_id, video_id, benchmark, category, question, ground_truth,
                 method, model, prediction, correct, internals,
                 inference_time_s, seed, config_hash]
  sample_id_format: "{video_id}::{question}"   # 원본 키 기반, 자체 넘버링 금지 (선배와 합의 필요)
